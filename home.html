<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Добро пожаловать!</h2>

    <img src="images/russia.jpg" class="main-image" alt="Россия">

    <p>
        Россия — самая большая страна в мире, богатая природными чудесами,
        историческими памятниками и культурным наследием.
        На этом сайте вы познакомитесь с самыми известными
        достопримечательностями нашей страны.
    </p>

    <h3>Оставьте отзыв о сайте</h3>

    <form>
        <label>Ваше имя:</label><br>
        <input type="text" name="name"><br><br>

        <label>Ваш город:</label><br>
        <input type="text" name="city"><br><br>

        <label>Какая достопримечательность понравилась больше всего?</label><br>
        <select>
            <option>Москва</option>
            <option>Санкт-Петербург</option>
            <option>Озеро Байкал</option>
            <option>Камчатка</option>
        </select><br><br>

        <label>Ваш отзыв:</label><br>
        <textarea rows="5" cols="40"></textarea><br><br>

        <input type="submit" value="Отправить">
        <input type="reset" value="Очистить">
    </form>
</body>
</html>
